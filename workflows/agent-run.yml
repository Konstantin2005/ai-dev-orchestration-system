name: AI Agent Pipeline

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  WORK_DIR: workspace/issues
  BRANCH_PREFIX: ai-issue
  MAX_RETRY: 3

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sanitize input
        id: parse
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -d '/\\..~' \
            | sed 's/[^a-z0-9]/-/g;s/--*/-/g;s/^-//;s/-$//' \
            | head -c 80)
          [ -z "$SLUG" ] && SLUG="issue-${{ github.event.issue.number }}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "id=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_PREFIX}-${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Check idempotency
        id: idem
        run: |
          BRANCH="${{ steps.parse.outputs.branch }}"
          if git ls-remote --heads origin "$BRANCH" 2>/dev/null | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bootstrap
        if: steps.idem.outputs.skip != 'true'
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          for role in 00-architect 01-backend-engineer 02-frontend-engineer 03-qa-engineer 04-code-reviewer shared logs; do
            mkdir -p "$DIR/$role"
          done
          echo "dir=$DIR" >> "$GITHUB_ENV"

      - name: AI Orchestration
        if: steps.idem.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          cat > /tmp/prompt.txt << 'EOF'
          You are an AI Orchestrator. Output strict JSON:
          {"architecture":{"summary":"","flow":"","decisions":[]},"files":[{"path":"","content":""}],"logs":{"architect":"","backend":"","frontend":"","qa":"","reviewer":""},"status":"READY_FOR_PR"}
          JSON only.
          EOF
          for i in $(seq 1 ${MAX_RETRY}); do
            curl -s -X POST "https://api.openai.com/v1/chat/completions" \
              -H "Authorization: Bearer $OPENAI_API_KEY" -H "Content-Type: application/json" \
              -d "$(jq -n --arg m gpt-4o-mini --arg s "$(cat /tmp/prompt.txt)" --arg u "Issue #${{ steps.parse.outputs.id }}" '{model:$m,messages:[{role:"system",content:$s},{role:"user",content:$u}],temperature:0.3}')" \
              | jq -r '.choices[0].message.content' > "$DIR/ai-output.json" 2>/dev/null && break
            sleep $((i * 5))
          done

      - name: Validate and write
        if: steps.idem.outputs.skip != 'true'
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          [ ! -f "$DIR/ai-output.json" ] && exit 1
          node runtime/validate-output.js "${DIR}/" < "$DIR/ai-output.json" || exit 1
          jq -r '.files[] | .path' "$DIR/ai-output.json" | while IFS= read -r p; do
            mkdir -p "$(dirname "$p")"
            jq -r --arg p "$p" '.files[] | select(.path == $p) | .content' "$DIR/ai-output.json" > "$p"
          done

      - name: Commit and PR
        if: steps.idem.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.parse.outputs.branch }}"
          git add -A "${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}/"
          git diff --staged --quiet && exit 0
          git commit -m "AI orchestration for #${{ steps.parse.outputs.id }}"
          git push origin "${{ steps.parse.outputs.branch }}"
          gh pr create --title "AI Implementation for #${{ steps.parse.outputs.id }}" \
            --body "Auto-generated by AI Dev Orchestration System" \
            --base main --head "${{ steps.parse.outputs.branch }}" || true

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ✅ Pipeline executed\nSee `workspace/issues/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}/`'
            });
