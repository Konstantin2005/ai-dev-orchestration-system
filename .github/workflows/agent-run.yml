name: AI Agent Pipeline

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      use_submodule:
        description: 'Run as submodule inside another repository'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  WORK_DIR: workspace/issues
  BRANCH_PREFIX: ai-issue
  MAX_RETRY: 3

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect submodule mode
        id: mode
        run: |
          if [ -f ".ai-system/VERSION" ] || [ "${{ github.event.inputs.use_submodule }}" == "true" ]; then
            echo "is_submodule=true" >> "$GITHUB_OUTPUT"
            echo "engine_root=.ai-system" >> "$GITHUB_OUTPUT"
          else
            echo "is_submodule=false" >> "$GITHUB_OUTPUT"
            echo "engine_root=." >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ steps.mode.outputs.engine_root }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ steps.mode.outputs.engine_root }}

      - name: Bootstrap engine (submodule mode)
        if: steps.mode.outputs.is_submodule == 'true'
        run: |
          bash "${{ steps.mode.outputs.engine_root }}/engine/bootstrap.sh"

      - name: Sanitize input
        id: parse
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -d '/\\..~' \
            | sed 's/[^a-z0-9]/-/g;s/--*/-/g;s/^-//;s/-$//' \
            | head -c 80)
          [ -z "$SLUG" ] && SLUG="issue-${{ github.event.issue.number }}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "id=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_PREFIX}-${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Check idempotency
        id: idem
        run: |
          BRANCH="${{ steps.parse.outputs.branch }}"
          if git ls-remote --heads origin "$BRANCH" 2>/dev/null | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bootstrap workspace
        if: steps.idem.outputs.skip != 'true'
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          for role in 00-architect 01-backend-engineer 02-frontend-engineer 03-qa-engineer 04-code-reviewer shared logs; do
            mkdir -p "$DIR/$role"
          done
          echo "dir=$DIR" >> "$GITHUB_ENV"

      - name: LangGraph Execution
        if: steps.idem.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_ID: ${{ steps.parse.outputs.id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          WORKSPACE_DIR: ${{ env.dir }}
          ENGINE_ROOT: ${{ steps.mode.outputs.engine_root }}
        run: |
          node -e "
            const { execute } = require('./' + process.env.ENGINE_ROOT + '/runtime/graph/index.js');
            execute({
              id: parseInt(process.env.ISSUE_ID),
              title: process.env.ISSUE_TITLE,
              body: process.env.ISSUE_BODY || ''
            }).then(result => {
              if (result.status === 'READY_FOR_PR') {
                console.log('LangGraph execution completed successfully');
                process.exit(0);
              } else {
                console.error('LangGraph returned status:', result.status);
                process.exit(1);
              }
            }).catch(err => {
              console.error('LangGraph execution failed:', err.message);
              process.exit(1);
            });
          " && echo "LANGGRAPH_OK=true" >> "$GITHUB_ENV" || echo "LANGGRAPH_OK=false" >> "$GITHUB_ENV"

      - name: Legacy Fallback
        if: steps.idem.outputs.skip != 'true' && env.LANGGRAPH_OK == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          echo "Falling back to legacy pipeline..."
          cat > /tmp/prompt.txt << 'EOF'
          You are an AI Orchestrator. Output strict JSON:
          {"architecture":{"summary":"","flow":"","decisions":[]},"files":[{"path":"","content":""}],"logs":{"architect":"","backend":"","frontend":"","qa":"","reviewer":""},"status":"READY_FOR_PR"}
          JSON only.
          EOF
          SUCCESS=false
          for i in $(seq 1 ${MAX_RETRY}); do
            RESPONSE=$(curl -s -X POST "https://api.openai.com/v1/chat/completions" \
              -H "Authorization: Bearer $OPENAI_API_KEY" -H "Content-Type: application/json" \
              -d "$(jq -n --arg m gpt-4o-mini --arg s "$(cat /tmp/prompt.txt)" --arg u "Issue #${{ steps.parse.outputs.id }}" '{model:$m,messages:[{role:"system",content:$s},{role:"user",content:$u}],temperature:0.3}')")
            echo "$RESPONSE" | jq -e '.choices[0].message.content' > /dev/null 2>&1 || { sleep $((i * 5)); continue; }
            echo "$RESPONSE" | jq -r '.choices[0].message.content' > "$DIR/ai-output.json" && SUCCESS=true && break
            sleep $((i * 5))
          done
          if [ "$SUCCESS" != "true" ]; then
            echo "All retries failed."
            exit 1
          fi

      - name: Validate output
        if: steps.idem.outputs.skip != 'true'
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          ENGINE_ROOT="${{ steps.mode.outputs.engine_root }}"
          if [ "$LANGGRAPH_OK" == "true" ]; then
            ls "$DIR"/**/*.md "$DIR"/**/*.json "$DIR"/**/*.js 2>/dev/null || echo "No files found from LangGraph"
          else
            [ ! -f "$DIR/ai-output.json" ] && exit 1
            node "$ENGINE_ROOT/runtime/validate-output.js" "${DIR}/" < "$DIR/ai-output.json" || exit 1
          fi

      - name: Run path-resolver
        if: steps.idem.outputs.skip != 'true' && steps.mode.outputs.is_submodule == 'true'
        env:
          ENGINE_ROOT: ${{ steps.mode.outputs.engine_root }}
          WORKSPACE_DIR: ${{ env.dir }}
        run: |
          node -e "
            const path = require('path');
            const fs = require('fs');
            const { resolvePath } = require(path.resolve(process.env.ENGINE_ROOT, 'runtime/path-resolver'));
            const workspace = path.resolve(process.env.WORKSPACE_DIR);
            const projectRoot = path.resolve(process.env.GITHUB_WORKSPACE);

            function walk(dir) {
              const files = [];
              if (!fs.existsSync(dir)) return files;
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  files.push(...walk(full));
                } else {
                  files.push(full);
                }
              }
              return files;
            }

            const generated = walk(workspace);
            let moved = 0;
            for (const file of generated) {
              const relative = path.relative(workspace, file).replace(/\\\\/g, '/');
              const result = resolvePath(relative, projectRoot);
              if (result.resolved) {
                fs.mkdirSync(path.dirname(result.resolved), { recursive: true });
                fs.copyFileSync(file, result.resolved);
                console.log('  \u2713', relative, '\u2192', path.relative(projectRoot, result.resolved));
                moved++;
              } else {
                console.log('  \u2013', relative, '(' + result.error + ')');
              }
            }
            console.log('Path resolution complete: ' + moved + ' files resolved');
          "

      - name: Commit and PR
        if: steps.idem.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.parse.outputs.branch }}"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "AI orchestration for #${{ steps.parse.outputs.id }}"
          git push origin "${{ steps.parse.outputs.branch }}"
          if ! gh pr create --title "AI Implementation for #${{ steps.parse.outputs.id }}" \
            --body "Auto-generated by AI Dev Orchestration System" \
            --base main --head "${{ steps.parse.outputs.branch }}"; then
            echo "PR creation failed"
            exit 1
          fi

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## \u2705 Pipeline executed\nSee `workspace/issues/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}/`\n\n**Engine:** ${{ env.LANGGRAPH_OK == 'true' && 'LangGraph' || 'Legacy' }}\n**Mode:** ${{ steps.mode.outputs.is_submodule == 'true' && 'Submodule' || 'Standalone' }}'
            });
