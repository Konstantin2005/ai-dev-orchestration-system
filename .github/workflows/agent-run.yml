name: AI Agent Pipeline

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      use_submodule:
        description: 'Run as submodule inside another repository'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  WORK_DIR: workspace/issues
  BRANCH_PREFIX: ai-issue

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect submodule mode
        id: mode
        run: |
          if [ -f ".ai-system/VERSION" ] || [ "${{ github.event.inputs.use_submodule }}" == "true" ]; then
            echo "is_submodule=true" >> "$GITHUB_OUTPUT"
            echo "engine_root=.ai-system" >> "$GITHUB_OUTPUT"
          else
            echo "is_submodule=false" >> "$GITHUB_OUTPUT"
            echo "engine_root=." >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ steps.mode.outputs.engine_root }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ steps.mode.outputs.engine_root }}

      - name: Bootstrap engine (submodule mode)
        if: steps.mode.outputs.is_submodule == 'true'
        run: |
          bash "${{ steps.mode.outputs.engine_root }}/engine/bootstrap.sh"

      - name: Sanitize input
        id: parse
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -d '/\\..~' \
            | sed 's/[^a-z0-9]/-/g;s/--*/-/g;s/^-//;s/-$//' \
            | head -c 80)
          [ -z "$SLUG" ] && SLUG="issue-${{ github.event.issue.number }}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "id=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_PREFIX}-${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Check idempotency
        id: idem
        run: |
          BRANCH="${{ steps.parse.outputs.branch }}"
          if git ls-remote --heads origin "$BRANCH" 2>/dev/null | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bootstrap workspace
        if: steps.idem.outputs.skip != 'true'
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          for role in 00-architect 01-backend-engineer 02-frontend-engineer 03-qa-engineer 04-code-reviewer shared logs; do
            mkdir -p "$DIR/$role"
          done
          echo "dir=$DIR" >> "$GITHUB_ENV"

      - name: LangGraph Execution
        id: graph
        if: steps.idem.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_ID: ${{ steps.parse.outputs.id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          WORKSPACE_DIR: ${{ env.dir }}
          ENGINE_ROOT: ${{ steps.mode.outputs.engine_root }}
        run: |
          node -e "
            const path = require('path');
            const fs = require('fs');
            process.env.OPENAI_API_KEY = process.env.OPENAI_API_KEY;
            const { execute } = require(path.resolve(process.env.ENGINE_ROOT, 'runtime/graph/index.js'));
            execute({
              id: parseInt(process.env.ISSUE_ID),
              title: process.env.ISSUE_TITLE,
              body: process.env.ISSUE_BODY || ''
            }).then(output => {
              const tracePath = path.resolve(process.env.WORKSPACE_DIR || '.', 'execution-trace.json');
              fs.mkdirSync(path.dirname(tracePath), { recursive: true });
              fs.writeFileSync(tracePath, JSON.stringify({
                runId: output.runId,
                status: output.status,
                failedStep: output.failedStep,
                error: output.error,
                trace: output.trace,
                resultStatus: output.result ? output.result.status : null
              }, null, 2), 'utf-8');
              console.log('Trace written to', tracePath);
              if (output.status === 'DONE') {
                const resultPath = path.resolve(process.env.WORKSPACE_DIR || '.', 'ai-output.json');
                fs.writeFileSync(resultPath, JSON.stringify(output.result, null, 2), 'utf-8');
                console.log('Result written to', resultPath);
                process.exit(0);
              } else {
                console.error('Pipeline failed at step:', output.failedStep);
                console.error('Error:', output.error);
                process.exit(1);
              }
            }).catch(err => {
              console.error('Execution failed:', err.message);
              process.exit(1);
            });
          "

      - name: Validate output via zero-trust gate
        if: steps.idem.outputs.skip != 'true'
        run: |
          DIR="${WORK_DIR}/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}"
          ENGINE_ROOT="${{ steps.mode.outputs.engine_root }}"
          if [ -f "$DIR/ai-output.json" ]; then
            node "$ENGINE_ROOT/runtime/validate-output.js" "${DIR}/" < "$DIR/ai-output.json" || exit 1
            echo "VALIDATION_PASSED=true" >> "$GITHUB_ENV"
          else
            echo "No ai-output.json found — pipeline may have failed"
            exit 1
          fi

      - name: Run path-resolver
        if: steps.idem.outputs.skip != 'true' && steps.mode.outputs.is_submodule == 'true' && env.VALIDATION_PASSED == 'true'
        env:
          ENGINE_ROOT: ${{ steps.mode.outputs.engine_root }}
          WORKSPACE_DIR: ${{ env.dir }}
        run: |
          node -e "
            const path = require('path');
            const fs = require('fs');
            const { resolvePath } = require(path.resolve(process.env.ENGINE_ROOT, 'runtime/path-resolver'));
            const workspace = path.resolve(process.env.WORKSPACE_DIR);
            const projectRoot = path.resolve(process.env.GITHUB_WORKSPACE);

            function walk(dir) {
              const files = [];
              if (!fs.existsSync(dir)) return files;
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  files.push(...walk(full));
                } else {
                  files.push(full);
                }
              }
              return files;
            }

            const generated = walk(workspace);
            let moved = 0;
            for (const file of generated) {
              const relative = path.relative(workspace, file).replace(/\\\\/g, '/');
              const result = resolvePath(relative, projectRoot);
              if (result.resolved) {
                fs.mkdirSync(path.dirname(result.resolved), { recursive: true });
                fs.copyFileSync(file, result.resolved);
                console.log('  \u2713', relative, '\u2192', path.relative(projectRoot, result.resolved));
                moved++;
              } else {
                console.log('  \u2013', relative, '(' + result.error + ')');
              }
            }
            console.log('Path resolution complete: ' + moved + ' files resolved');
          "

      - name: Commit and PR
        if: steps.idem.outputs.skip != 'true' && env.VALIDATION_PASSED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.parse.outputs.branch }}"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "AI orchestration for #${{ steps.parse.outputs.id }}"
          git push origin "${{ steps.parse.outputs.branch }}"
          if ! gh pr create --title "AI Implementation for #${{ steps.parse.outputs.id }}" \
            --body "Auto-generated by AI Dev Orchestration System" \
            --base main --head "${{ steps.parse.outputs.branch }}"; then
            echo "PR creation failed"
            exit 1
          fi

      - name: Post success comment
        if: success() && steps.idem.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tracePath = process.env.WORKSPACE_DIR + '/execution-trace.json';
            let traceInfo = '';
            try {
              const trace = JSON.parse(fs.readFileSync(tracePath, 'utf-8'));
              traceInfo = '\n**Run ID:** ' + trace.runId +
                '\n**Status:** ' + trace.status +
                '\n**Result:** ' + (trace.resultStatus || 'N/A');
            } catch (e) {
              traceInfo = '\n**Trace:** unavailable';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## \u2705 Pipeline executed successfully\n' +
                'See `workspace/issues/${{ steps.parse.outputs.id }}-${{ steps.parse.outputs.slug }}/`\n' +
                traceInfo +
                '\n**Engine:** LangGraph' +
                '\n**Mode:** ${{ steps.mode.outputs.is_submodule == 'true' && 'Submodule' || 'Standalone' }}'
            });

      - name: Post failure comment
        if: failure() && steps.idem.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tracePath = process.env.WORKSPACE_DIR + '/execution-trace.json';
            let traceInfo = '';
            try {
              const trace = JSON.parse(fs.readFileSync(tracePath, 'utf-8'));
              traceInfo = '\n**Run ID:** ' + trace.runId +
                '\n**Failed Step:** ' + (trace.failedStep || 'unknown') +
                '\n**Error:** ' + (trace.error || 'unknown');
            } catch (e) {
              traceInfo = '\n**Trace:** unavailable';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## \u274c Pipeline failed\n' +
                traceInfo +
                '\n\nSee workflow logs for details.'
            });
